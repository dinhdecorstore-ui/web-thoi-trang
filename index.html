<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIR+ Store — Web thời trang đầy đủ</title>
  <meta name="description" content="Website bán hàng thời trang đầy đủ: trang chủ, danh mục, chi tiết sản phẩm, giỏ hàng, checkout, tài khoản, đơn hàng và hỗ trợ." />
  <meta name="theme-color" content="#e60012" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="promo-bar">
    <span>Freeship từ 999.000đ</span>
    <span>Đổi trả 30 ngày</span>
    <span>Mã giảm giá: AIR10</span>
  </div>

  <header class="site-header">
    <a class="brand" href="#/" aria-label="AIR+ Store"><span>AIR</span><span>PLUS</span></a>
    <button class="menu-button" type="button" data-menu-toggle aria-label="Mở menu"><span></span><span></span><span></span></button>
    <nav class="main-nav" data-main-nav>
      <a href="#/">Trang chủ</a>
      <a href="#/shop">Sản phẩm</a>
      <a href="#/lookbook">Lookbook</a>
      <a href="#/support">Hỗ trợ</a>
      <a href="#/account">Tài khoản</a>
    </nav>
    <div class="header-actions">
      <button type="button" class="plain-button" data-search-focus>Tìm kiếm</button>
      <a class="plain-button" href="#/account">♥ <span data-wishlist-count>0</span></a>
      <a class="cart-link" href="#/cart">Giỏ hàng <span data-cart-count>0</span></a>
    </div>
  </header>

  <main id="app" class="app-shell" aria-live="polite"></main>

  <footer class="site-footer">
    <div>
      <a class="brand small" href="#/"><span>AIR</span><span>PLUS</span></a>
      <p>Website thời trang đầy đủ chức năng demo, chạy tĩnh trên GitHub Pages.</p>
    </div>
    <nav>
      <a href="#/shop">Sản phẩm</a>
      <a href="#/cart">Giỏ hàng</a>
      <a href="#/orders">Đơn hàng</a>
      <a href="terms.html">Điều khoản</a>
      <a href="privacy.html">Quyền riêng tư</a>
    </nav>
  </footer>

  <div class="toast" data-toast role="status" aria-live="polite"></div>
  <script src="script.js"></script>
</body>
</html>
